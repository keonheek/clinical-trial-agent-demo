<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive Clinical Trial Recommendation — Live</title>
<style>
  :root{
    --accent:#0f6e5a;
    --accent-dark:#0b5646;
    --accent-soft:#e6f2ef;
    --ink:#1f2937;
    --ink-soft:#6b7280;
    --line:#e5e7eb;
    --bg:#ffffff;
    --bg-alt:#f8f9fa;
    --met:#1f8a4c;
    --met-bg:#e8f6ee;
    --not-met:#b3261e;
    --not-met-bg:#fbeceb;
    --uncertain:#92660a;
    --uncertain-bg:#fdf3dd;
    --unknown:#5f6b7a;
    --unknown-bg:#eef0f2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans KR","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    line-height:1.55;
    font-size:15px;
  }
  h1,h2,h3{font-weight:700;line-height:1.3;}

  header.topbar{
    padding:22px 24px 16px;
    border-bottom:1px solid var(--line);
    max-width:1200px;
    margin:0 auto;
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  header.topbar h1{font-size:1.35rem;margin:0;}
  header.topbar .subtitle{margin:0;color:var(--ink-soft);font-size:0.88rem;flex:1 1 260px;}

  .badge-pill{
    display:inline-block;
    font-size:0.72rem;
    font-weight:700;
    padding:3px 10px;
    border-radius:99px;
    background:var(--accent-soft);
    color:var(--accent-dark);
    white-space:nowrap;
  }
  .badge-pill.mode-precomputed{background:var(--unknown-bg);color:var(--unknown);}
  .badge-pill.mode-live{background:var(--met-bg);color:var(--met);}

  nav.agent-map{
    display:flex;
    flex-wrap:wrap;
    max-width:1200px;
    margin:0 auto;
    padding:8px 24px;
    background:var(--bg-alt);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:20;
  }
  .agent-step{
    flex:1 1 auto;
    min-width:100px;
    text-align:center;
    font-size:0.76rem;
    color:var(--ink-soft);
    padding:8px 6px;
    border-bottom:3px solid transparent;
    white-space:nowrap;
    position:relative;
  }
  .agent-step .n{display:block;font-size:0.66rem;color:#9aa2ad;margin-bottom:2px;}
  .agent-step.done{color:var(--accent-dark);border-bottom-color:var(--accent);font-weight:700;}
  .agent-step.running{color:var(--accent-dark);border-bottom-color:var(--accent);font-weight:700;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.45;}}

  .shell{
    display:grid;
    grid-template-columns:260px 1fr;
    max-width:1200px;
    margin:0 auto;
  }
  @media (max-width:860px){ .shell{grid-template-columns:1fr;} }

  aside.sidebar{
    border-right:1px solid var(--line);
    padding:18px 16px;
    align-self:start;
    position:sticky;
    top:44px;
    max-height:calc(100vh - 44px);
    overflow-y:auto;
  }
  @media (max-width:860px){
    aside.sidebar{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--line);}
  }
  aside.sidebar h2{font-size:0.82rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin:0 0 10px;}

  .patient-btn{
    display:block;width:100%;text-align:left;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:7px;
    cursor:pointer;font-family:inherit;font-size:0.84rem;color:var(--ink);
  }
  .patient-btn strong{display:block;color:var(--accent-dark);font-size:0.88rem;margin-bottom:2px;}
  .patient-btn .snippet{color:var(--ink-soft);font-size:0.76rem;}
  .patient-btn.selected{border-color:var(--accent);background:var(--accent-soft);}

  .custom-box{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .custom-box h2{font-size:0.82rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin:0 0 8px;}
  .custom-box textarea{
    width:100%;min-height:110px;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-family:inherit;font-size:0.83rem;resize:vertical;
  }
  .btn{
    display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:6px;
    padding:8px 14px;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;margin-top:8px;
  }
  .btn:hover{background:var(--accent-dark);}
  .btn:disabled{background:var(--unknown);cursor:not-allowed;}
  .btn-sm{padding:5px 10px;font-size:0.78rem;margin-top:0;}

  main{padding:22px 24px 60px;min-width:0;}

  .empty-note{
    border:1px dashed var(--line);border-radius:8px;padding:40px 20px;text-align:center;
    color:var(--ink-soft);max-width:520px;margin:60px auto;
  }

  .vignette{
    background:var(--bg-alt);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;font-size:0.9rem;margin-bottom:16px;
  }
  .vignette .lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.03em;color:var(--ink-soft);display:block;margin-bottom:4px;}

  .badge{
    display:inline-block;padding:2px 8px;border-radius:99px;font-size:0.72rem;font-weight:700;white-space:nowrap;
  }
  .badge-MET{background:var(--met-bg);color:var(--met);}
  .badge-NOT_MET{background:var(--not-met-bg);color:var(--not-met);}
  .badge-UNCERTAIN{background:var(--uncertain-bg);color:var(--uncertain);}
  .badge-UNKNOWN{background:var(--unknown-bg);color:var(--unknown);}
  .badge-ELIGIBLE{background:var(--met-bg);color:var(--met);}
  .badge-INELIGIBLE{background:var(--not-met-bg);color:var(--not-met);}

  .tag{display:inline-block;font-size:0.7rem;padding:1px 6px;border-radius:4px;border:1px solid var(--line);color:var(--ink-soft);}
  .tag.inclusion{border-color:#bcd8ce;color:var(--accent-dark);}
  .tag.exclusion{border-color:#e3c2bd;color:#8a3a33;}

  .trial-card{
    border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;
    transition:border-color 0.3s;
  }
  .trial-card-head{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;}
  .trial-card-head .rank{font-size:1.15rem;font-weight:700;color:var(--accent);width:26px;text-align:center;flex:0 0 auto;}
  .trial-card-head .titlewrap{flex:1 1 auto;min-width:200px;}
  .trial-card-head h3{font-size:0.94rem;margin:0 0 2px;}
  .trial-card-head .meta{font-size:0.76rem;color:var(--ink-soft);}
  .trial-card-head .meta span.meta-sep{margin-left:8px;padding-left:8px;border-left:1px solid var(--line);}
  .trial-card .rationale{font-size:0.85rem;color:var(--ink-soft);margin:0 0 10px;}

  .crit-row{
    display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:start;
    padding:8px 0;border-top:1px solid var(--line);
  }
  .crit-row:first-of-type{border-top:none;}
  .crit-row .crit-text{font-size:0.85rem;}
  .crit-row .crit-evidence{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:0.76rem;color:var(--ink-soft);margin-top:3px;}
  .crit-row .crit-reason{font-size:0.78rem;color:var(--ink-soft);margin-top:2px;}
  .crit-row.flash{animation:flashbg 1.1s ease;}
  @keyframes flashbg{0%{background:#fff2a8;}100%{background:transparent;}}
  .crit-row.spinning .crit-text::after{content:" 재평가 중";color:var(--accent);font-weight:600;}

  .questions-dock{
    border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-top:22px;background:var(--bg-alt);
  }
  .questions-dock h2{font-size:1rem;margin:0 0 10px;}
  .question-card{
    border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;
    padding:10px 14px;margin-bottom:10px;background:var(--bg);
  }
  .question-card .field{font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.03em;}
  .question-card .q{font-weight:600;margin:2px 0 4px;font-size:0.9rem;}
  .question-card .why{font-size:0.78rem;color:var(--ink-soft);margin-bottom:8px;}
  .question-card .answer-row{display:flex;gap:8px;flex-wrap:wrap;}
  .question-card input[type=text]{
    flex:1 1 220px;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-family:inherit;font-size:0.85rem;
  }
  .question-card.answered{opacity:0.6;}
  .question-card .answered-note{font-size:0.8rem;color:var(--accent-dark);font-weight:600;margin-top:6px;}

  .changelog{margin-top:14px;font-size:0.8rem;color:var(--ink-soft);}
  .changelog div{padding:4px 0;border-top:1px dashed var(--line);}
  .changelog div:first-child{border-top:none;}

  footer.disclaimer{
    max-width:1200px;margin:0 auto;padding:18px 24px 30px;border-top:1px solid var(--line);
    color:var(--ink-soft);font-size:0.78rem;
  }
</style>
</head>
<body>

<header class="topbar">
  <h1>Interactive Clinical Trial Recommendation</h1>
  <p class="subtitle">사람이 직접 답변을 입력하면 영향받는 기준만 실시간 재평가됩니다</p>
  <span class="badge-pill">백엔드: Groq (llama-3.3-70b)</span>
  <span class="badge-pill" id="modeBadge" style="display:none;"></span>
</header>

<nav class="agent-map" id="agentMap">
  <div class="agent-step" data-stage="extract"><span class="n">1</span>정보 추출</div>
  <div class="agent-step" data-stage="parse"><span class="n">2</span>기준 파싱</div>
  <div class="agent-step" data-stage="match"><span class="n">3</span>매칭</div>
  <div class="agent-step" data-stage="gaps"><span class="n">4</span>갭 탐지</div>
  <div class="agent-step" data-stage="questions"><span class="n">5</span>질문 생성</div>
  <div class="agent-step" data-stage="recommend"><span class="n">6</span>추천</div>
</nav>

<div class="shell">
  <aside class="sidebar">
    <h2>환자 선택</h2>
    <div id="patientList"></div>
    <div class="custom-box">
      <h2>새 환자 직접 입력</h2>
      <textarea id="customVignette" placeholder="예: 55세 여성, 제2형 당뇨, HbA1c 8.4%, 메트포르민 복용 중..."></textarea>
      <button class="btn" id="runCustomBtn">실행</button>
    </div>
  </aside>

  <main id="mainContent">
    <div class="empty-note" id="emptyNote">왼쪽에서 환자를 선택하거나 새 환자 정보를 입력하세요.</div>

    <div id="vignetteBox" class="vignette" style="display:none;"></div>
    <div id="trialsBody"></div>
    <div id="questionsDock" class="questions-dock" style="display:none;">
      <h2>확인 질문</h2>
      <div id="questionsBody"></div>
      <div class="changelog" id="changelog"></div>
    </div>
  </main>
</div>

<footer class="disclaimer">
  본 결과는 의학적 자문이 아닌 참고용입니다. 답변을 입력하면 실제 Groq LLM 호출로 영향받는 기준만 재평가됩니다.
</footer>

<script>
"use strict";

var STAGE_ORDER = ["queued","extract","parse","match","gaps","questions","recommend","done"];
var currentSessionId = null;
var pollTimer = null;
var lastTopNct = null;
var answeredQuestions = {};

function escapeHtml(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function el(tag, cls, html){
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

function badge(kind, text){
  return '<span class="badge badge-' + kind + '">' + escapeHtml(text) + '</span>';
}

// ---- patient list ----
function loadPatients(){
  fetch("/api/patients").then(function(r){ return r.json(); }).then(function(list){
    var box = document.getElementById("patientList");
    box.innerHTML = "";
    list.forEach(function(p){
      var btn = el("button", "patient-btn");
      btn.innerHTML = '<strong>' + escapeHtml(p.id) + '</strong><span class="snippet">' + escapeHtml(p.title) + '</span>';
      btn.addEventListener("click", function(){
        document.querySelectorAll(".patient-btn").forEach(function(b){ b.classList.remove("selected"); });
        btn.classList.add("selected");
        startSession({patient_id: p.id});
      });
      box.appendChild(btn);
    });
  });
}

document.getElementById("runCustomBtn").addEventListener("click", function(){
  var text = document.getElementById("customVignette").value.trim();
  if (!text) return;
  document.querySelectorAll(".patient-btn").forEach(function(b){ b.classList.remove("selected"); });
  startSession({vignette: text});
});

// ---- session lifecycle ----
function startSession(payload){
  resetView();
  fetch("/api/session", {
    method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data.error){ showError(data.error); return; }
    currentSessionId = data.session_id;
    setModeBadge(data.mode);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(poll, 500);
    poll();
  });
}

function resetView(){
  document.getElementById("emptyNote").style.display = "none";
  document.getElementById("vignetteBox").style.display = "none";
  document.getElementById("trialsBody").innerHTML = "";
  document.getElementById("questionsDock").style.display = "none";
  document.getElementById("questionsBody").innerHTML = "";
  document.getElementById("changelog").innerHTML = "";
  document.querySelectorAll(".agent-step").forEach(function(s){ s.classList.remove("done","running"); });
  lastTopNct = null;
  answeredQuestions = {};
}

function setModeBadge(mode){
  var b = document.getElementById("modeBadge");
  b.style.display = "inline-block";
  b.className = "badge-pill " + (mode === "precomputed" ? "mode-precomputed" : "mode-live");
  b.textContent = mode === "precomputed" ? "프리컴퓨트 모드" : "정밀 모드 (실시간)";
}

function showError(msg){
  document.getElementById("emptyNote").style.display = "block";
  document.getElementById("emptyNote").textContent = "오류: " + msg;
}

var currentQuestionsCache = [];

function poll(){
  if (!currentSessionId) return;
  fetch("/api/session/" + currentSessionId).then(function(r){ return r.json(); }).then(function(data){
    if (data.error && !data.result){ showError(data.error); clearInterval(pollTimer); return; }
    updateAgentMap(data.stage);
    renderVignette(data.result.patient);
    renderTrials(data.result.trials);
    if (data.result.questions && data.result.questions.length) currentQuestionsCache = data.result.questions;
    renderQuestions(currentQuestionsCache, data.result.trials);
    if (data.stage === "done" || data.stage === "error"){
      clearInterval(pollTimer);
      if (data.stage === "error") showError(data.error || "pipeline error");
    }
  });
}

function updateAgentMap(stage){
  var idx = STAGE_ORDER.indexOf(stage);
  document.querySelectorAll(".agent-step").forEach(function(s){
    var sIdx = STAGE_ORDER.indexOf(s.dataset.stage);
    s.classList.remove("done","running");
    if (stage === "done" || sIdx < idx) s.classList.add("done");
    else if (sIdx === idx) s.classList.add("running");
  });
}

function renderVignette(patient){
  if (!patient || !patient.text) return;
  var box = document.getElementById("vignetteBox");
  box.style.display = "block";
  box.innerHTML = '<span class="lbl">' + escapeHtml(patient.patient_id) + '</span>' + escapeHtml(patient.text);
}

function renderTrials(trials){
  var box = document.getElementById("trialsBody");
  if (!trials || trials.length === 0){ box.innerHTML = ""; return; }
  var sorted = trials.slice().sort(function(a,b){ return (a.rank||99) - (b.rank||99); });
  box.innerHTML = "";
  sorted.forEach(function(t){
    var card = el("div", "trial-card");
    card.dataset.nct = t.nct_id;
    var elig = t.eligibility ? badge(t.eligibility === "ELIGIBLE" ? "ELIGIBLE" : (t.eligibility === "INELIGIBLE" ? "INELIGIBLE" : "UNCERTAIN"), t.eligibility) : "";
    var head = el("div", "trial-card-head");
    head.innerHTML =
      '<div class="rank">' + (t.rank || "?") + '</div>' +
      '<div class="titlewrap"><h3>' + escapeHtml(t.title) + '</h3>' +
      '<div class="meta">' + escapeHtml(t.nct_id) +
      '<span class="meta-sep">Phase ' + escapeHtml(t.phase || "NA") + '</span>' +
      '<span class="meta-sep">' + elig + '</span></div></div>';
    card.appendChild(head);
    if (t.rationale){
      card.appendChild(el("p", "rationale", escapeHtml(t.rationale)));
    }
    var body = el("div", "crit-body");
    (t.criteria || []).forEach(function(c, ci){
      var row = el("div", "crit-row");
      row.dataset.nct = t.nct_id;
      row.dataset.critText = c.text;
      row.innerHTML =
        '<div>' + badge(c.verdict, c.verdict) + '<br><span class="tag ' + c.type + '">' + (c.type === "inclusion" ? "포함" : "제외") + '</span></div>' +
        '<div><div class="crit-text">' + escapeHtml(c.text) + '</div>' +
        (c.evidence ? '<div class="crit-evidence">&quot;' + escapeHtml(c.evidence) + '&quot;</div>' : '') +
        (c.reasoning ? '<div class="crit-reason">' + escapeHtml(c.reasoning) + '</div>' : '') + '</div>';
      body.appendChild(row);
    });
    head.addEventListener("click", function(){
      body.style.display = body.style.display === "none" ? "block" : "none";
    });
    card.appendChild(body);
    box.appendChild(card);
  });
}

function renderQuestions(questions, trials){
  var dock = document.getElementById("questionsDock");
  var body = document.getElementById("questionsBody");
  if (!questions || questions.length === 0){ dock.style.display = "none"; return; }
  dock.style.display = "block";
  body.innerHTML = "";
  questions.forEach(function(q, qi){
    var card = el("div", "question-card");
    var isAnswered = answeredQuestions[q.question];
    if (isAnswered) card.classList.add("answered");
    card.innerHTML =
      '<div class="field">' + escapeHtml(q.field) + '</div>' +
      '<div class="q">' + escapeHtml(q.question) + '</div>' +
      '<div class="why">' + escapeHtml(q.why) + '</div>';
    if (isAnswered){
      card.appendChild(el("div", "answered-note", "반영됨: " + escapeHtml(isAnswered)));
    } else {
      var row = el("div", "answer-row");
      var input = document.createElement("input");
      input.type = "text";
      input.placeholder = "답변을 입력하세요";
      var btn = el("button", "btn btn-sm", "답변 반영");
      btn.addEventListener("click", function(){
        var val = input.value.trim();
        if (!val) return;
        submitAnswer(q.question, val, card, input, btn);
      });
      row.appendChild(input);
      row.appendChild(btn);
      card.appendChild(row);
    }
    body.appendChild(card);
  });
}

function submitAnswer(question, answer, card, input, btn){
  btn.disabled = true;
  input.disabled = true;
  btn.textContent = "재평가 중...";
  // mark rows for criteria that MIGHT be affected as spinning (best-effort visual cue)
  document.querySelectorAll(".crit-row").forEach(function(row){
    var badgeEl = row.querySelector(".badge");
    if (badgeEl && (badgeEl.textContent === "UNKNOWN" || badgeEl.textContent === "UNCERTAIN")){
      row.classList.add("spinning");
    }
  });

  fetch("/api/session/" + currentSessionId + "/answer", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({question: question, answer: answer})
  }).then(function(r){ return r.json(); }).then(function(data){
    document.querySelectorAll(".crit-row.spinning").forEach(function(row){ row.classList.remove("spinning"); });
    if (data.error){
      btn.textContent = "오류: " + data.error;
      btn.disabled = false;
      input.disabled = false;
      return;
    }
    answeredQuestions[question] = answer;
    renderTrials(data.updated_trials);
    flashAffected(data.affected || []);
    appendChangelog(data.round, data.verdict_changes || [], data.recommendation || [], data.note);
    renderQuestions(currentQuestionsCache, data.updated_trials);
  });
}

function flashAffected(affected){
  affected.forEach(function(a){
    document.querySelectorAll('.crit-row[data-nct="' + a.nct_id + '"]').forEach(function(row){
      if (row.dataset.critText === a.text){
        row.classList.add("flash");
        setTimeout(function(){ row.classList.remove("flash"); }, 1200);
      }
    });
  });
}

function appendChangelog(round, changes, recommendation, note){
  var log = document.getElementById("changelog");
  var newTop = recommendation.length ? recommendation.slice().sort(function(a,b){return a.rank-b.rank;})[0].nct_id : null;
  var rankNote = "순위 변동 없음";
  if (lastTopNct && newTop && lastTopNct !== newTop){
    rankNote = "1위가 " + newTop + "(으)로 변경";
  }
  lastTopNct = newTop || lastTopNct;
  var text = note ? ("답변 " + round + " 반영: " + note)
    : ("답변 " + round + " 반영: " + changes.length + "개 기준 재평가, " + rankNote);
  var line = el("div", "", escapeHtml(text));
  log.insertBefore(line, log.firstChild);
}

loadPatients();
</script>
</body>
</html>
